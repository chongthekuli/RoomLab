<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RoomLAB</title>
  <link rel="stylesheet" href="css/main.css?v=29" />
  <link rel="stylesheet" href="css/theme.css?v=29" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <header id="app-header"><h1>RoomLAB</h1></header>
  <main id="app-root">
    <aside id="panel-left">
      <section id="panel-room"><h2>Room</h2></section>
      <section id="panel-sources"><h2>Sources</h2></section>
      <section id="panel-listeners"><h2>Listeners</h2></section>
      <section id="panel-zones"><h2>Audience zones</h2></section>
      <section id="panel-library">
        <h2>Library</h2>
        <div class="phase-placeholder">Browse &amp; import JSON loudspeaker files — coming later.</div>
      </section>
    </aside>
    <section id="viewport">
      <div class="viewport-tabs">
        <button class="vp-tab" data-view="2d">2D Floor plan</button>
        <button class="vp-tab active" data-view="3d">3D View</button>
        <button class="vp-toggle active" id="toggle-heatmaps" title="Show/hide SPL heatmap layer">SPL heatmap</button>
      </div>
      <div id="view-2d" class="viewport-view" hidden></div>
      <div id="view-3d" class="viewport-view">
        <div class="viewport-loading">Loading 3D view…</div>
      </div>
    </section>
    <aside id="panel-right">
      <section id="panel-results"><h2>Results</h2></section>
    </aside>
  </main>
  <script type="module" src="js/main.js?v=29"></script>
</body>
</html>
